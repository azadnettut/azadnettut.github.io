<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="آزادنت - ارائه ابزارها و خدمات رایگان برای دسترسی به اطلاعات آزاد و بدون محدودیت">
    <meta name="keywords" content="آزادنت, ابزارهای رایگان, عبور از فیلتر, ربات کاربردی, اطلاعات آزاد">
    <meta name="author" content="تیم آزادنت">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <title>وب سایت آزادنت</title>
    <link rel="icon" type="image/x-icon" href="ficon.png">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/vazir-font@latest/dist/Vazir.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vazir-font@latest/dist/font-face.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/aparat">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: black;
            font-family: 'Vazir', sans-serif;
            transition: background 0.5s ease, color 0.5s ease;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #000; color: #fff; }
            .header { background: rgba(255, 255, 255, 0.1); }
        }

        @media (prefers-color-scheme: light) {
            body { background: #fff; color: #000; }
            .header { background: rgba(0, 0, 0, 0.1); }
            .content-box { background: rgba(255, 255, 255, 0.5); color: #000; }
            .glass-button { color: #000; border-color: rgba(0, 0, 0, 0.2); }
        }

        .matrix {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .matrix-char {
            position: absolute;
            color: #0f0;
            font-family: monospace;
            font-size: 1.5vw;
            animation: fall linear infinite;
            white-space: nowrap;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0.3; }
        }

        .intro-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
            perspective: 1000px;
        }

        .circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #3498db;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
            transition: opacity 0.5s ease;
        }

        .circle.spin {
            animation: spinAndZoom3D 0.5s ease-in-out forwards;
        }

        @keyframes spinAndZoom3D {
            0% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            50% { transform: rotateY(360deg) rotateX(180deg) scale(2); }
            100% { transform: rotateY(720deg) rotateX(360deg) scale(20); opacity: 0; }
        }

        .main-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none;
            z-index: 2;
            direction: rtl;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .main-page.visible {
            display: block;
            opacity: 1;
        }

        .slides-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 100px);
            margin-top: 100px;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        section.active { opacity: 1; }

        section:nth-child(1) {
            background: none;
        }

        section:nth-child(1) video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pattern-slide {
            background-image: url('pattern.png');
            background-repeat: repeat;
            background-size: auto;
            background-position: center;
            background-color: var(--slide-bg-color, transparent);
        }

        .timer-circle {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            background-color: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
        }

        .content-box {
            position: absolute;
            z-index: 500;
            color: white;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            max-width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
            font-size: 18px;
            text-align: center;
            text-align: justify;
            overflow-wrap: break-word;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .content-box p, .content-box h3 {
            text-align: center;
            text-align: justify;
        }

        .blog-filter {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .blog-filter select {
            padding: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: gold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            font-family: 'Vazir', sans-serif;
            cursor: pointer;
        }

        .blog-post {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            text-align: justify;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: background 0.5s ease, border-bottom 0.5s ease;
        }

        .header h1 {
            margin: 5px 0;
            font-size: 32px;
            color: gold;
            font-family: 'Aparat', 'Vazir', sans-serif;
            text-align: center;
            transition: color 0.5s ease;
            pointer-events: none;
            user-select: none;
        }

        .header-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 5px;
            justify-content: center;
            max-width: 100%;
            overflow-x: auto;
            white-space: nowrap;
        }

        .header-nav a {
            color: gold;
            font-family: 'Vazir', sans-serif;
            font-size: 16px;
            text-decoration: none;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .header-nav a:hover { color: #fff; }

        .header-nav a.active {
            color: #b8860b;
        }

        .dna-structure {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .dna-strand {
            position: absolute;
            width: 4px;
            height: 20px;
            background: rgba(255, 215, 0, 0.7);
            border-radius: 2px;
            transition: transform 0.2s ease-out, background 0.5s ease;
        }

        .dna-strand:nth-child(1) { top: 10%; left: 10%; }
        .dna-strand:nth-child(2) { top: 10%; left: 30%; }
        .dna-strand:nth-child(3) { top: 10%; left: 50%; }
        .dna-strand:nth-child(4) { top: 10%; left: 70%; }
        .dna-strand:nth-child(5) { top: 30%; left: 10%; }
        .dna-strand:nth-child(6) { top: 30%; left: 30%; }
        .dna-strand:nth-child(7) { top: 30%; left: 50%; }
        .dna-strand:nth-child(8) { top: 30%; left: 70%; }
        .dna-strand:nth-child(9) { top: 50%; left: 10%; }
        .dna-strand:nth-child(10) { top: 50%; left: 30%; }
        .dna-strand:nth-child(11) { top: 50%; left: 50%; }
        .dna-strand:nth-child(12) { top: 50%; left: 70%; }

        .language-selector, .theme-selector {
            position: fixed;
            top: 10px;
            z-index: 3000;
        }

        .language-selector { right: 10px; }
        .theme-selector { right: 100px; }

        .language-selector .lang-btn, .theme-selector .theme-btn {
            background: rgba(255, 255, 255, 0.5);
            color: gold;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Vazir', sans-serif;
            font-size: 14px;
            transition: background 0.5s ease;
        }

        .language-selector .dropdown, .theme-selector .dropdown {
            background: rgba(255, 255, 255, 0.5);
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            border-radius: 5px;
            padding: 5px;
            flex-direction: column;
        }

        .language-selector:hover .dropdown, .theme-selector:hover .dropdown { display: flex; }

        .language-selector .dropdown span, .theme-selector .dropdown span {
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: white;
        }

        .language-selector .dropdown span:hover, .theme-selector .dropdown span:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .language-selector .dropdown span.selected, .theme-selector .dropdown span.selected {
            color: #b8860b;
        }

        .language-option img { width: 16px; height: 16px; }

        .glass-button {
            display: block;
            margin: 15px auto 0;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: gold;
            font-family: 'Vazir', sans-serif;
            font-size: 16px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s ease, color 0.5s ease, border-color 0.5s ease;
        }

        .glass-button:hover { background: rgba(255, 255, 255, 0.2); }

        footer {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Vazir', sans-serif;
            font-size: 10px;
            color: white;
            text-align: center;
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            pointer-events: none;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .color-flow {
            display: inline-block;
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet, red);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: colorFlow 4s linear infinite;
        }

        @keyframes colorFlow {
            0% { background-position: 200% 0; }
            100% { background-position: 0 0; }
        }

        @media (max-width: 768px) {
            .header { height: 80px; }
            .header h1 { font-size: 24px; }
            .header-nav { gap: 10px; padding: 0 10px; }
            .header-nav a { font-size: 14px; }
            .slides-container { margin-top: 80px; height: calc(100vh - 80px); }
            .content-box { max-width: 85%; font-size: 16px; top: 10%; }
            .timer-circle { width: 35px; height: 35px; font-size: 14px; }
            .matrix-char { font-size: 2vw; }
            .circle { width: 150px; height: 150px; }
            footer { font-size: 8px; padding: 5px 10px; }
            .theme-selector { right: 80px; }
        }

        @media (max-width: 480px) {
            .header { height: 70px; padding: 5px; }
            .header h1 { font-size: 20px; }
            .header-nav { gap: 8px; margin-top: 2px; padding: 0 5px; flex-direction: row; justify-content: center; }
            .header-nav a { font-size: 12px; padding: 2px 5px; }
            .slides-container { margin-top: 70px; height: calc(100vh - 70px); }
            .content-box { max-width: 90%; font-size: 14px; top: 5%; padding: 10px; }
            .timer-circle { width: 30px; height: 30px; font-size: 12px; bottom: 5px; left: 5px; }
            .language-selector .lang-btn, .theme-selector .theme-btn { font-size: 12px; padding: 4px 8px; }
            .language-selector .dropdown span, .theme-selector .dropdown span { font-size: 10px; }
            .glass-button { font-size: 14px; padding: 6px 12px; }
            .matrix-char { font-size: 3vw; }
            .circle { width: 120px; height: 120px; }
            footer { font-size: 6px; padding: 4px 8px; }
            .theme-selector { right: 70px; }
        }
    </style>
</head>
<body>
    <div class="intro-container">
        <div class="matrix" aria-hidden="true"></div>
        <div class="circle" onclick="startAnimation()">
            <img src="logo.png" alt="Logo" style="max-width: 80%; max-height: 80%;">

    </div>

    <div class="main-page">
        <div class="header">
            <div class="dna-structure">
                <div class="dna-strand"></div>
                <div class="dna-strand"></div>

                <div class="dna-strand"></div>
                <div class="dna-strand"></div>
                <div class="dna-strand"></div>
                <div class="dna-strand"></div>

            <section>
                <video autoplay muted loop playsinline preload="auto">

            <section class="pattern-slide"><div class="content-box" data-lang="fa"></div></section>

                <span onclick="changeLanguage('en')"><img src="https://flagcdn.com/16x12/gb.png" alt="پرچم انگلیس" loading="lazy"> English</span>

                <span onclick="changeLanguage('zh')"><img src="https://flagcdn.com/16x12/cn.png" alt="پرچم چین" loading="lazy"> 中文</span>
                <span onclick="changeLanguage('ru')"><img src="https://flagcdn.com/16x12/ru.png" alt="پرچم روسیه" loading="lazy"> Русский</span>

            </div>
        </div>

        <footer>
            <span class="color-flow">This website was designed and built for the (AZADNET)</span>
        </footer>
    </div>

    <script>
        const matrix = document.querySelector('.matrix');
        const width = window.innerWidth;
        const charCount = Math.floor(width / 10);

        function createChar() {
            const char = document.createElement('span');
            char.classList.add('matrix-char');
            char.textContent = String.fromCharCode(33 + Math.floor(Math.random() * 94));
            char.style.left = `${Math.random() * 100}%`;
            char.style.animationDuration = `${Math.random() * 3 + 2}s`;
            char.style.opacity = Math.random() * 0.8 + 0.2;
            matrix.appendChild(char);

            char.addEventListener('animationend', () => {
                char.remove();
                createChar();
            });
        }

        for (let i = 0; i < charCount; i++) {
            setTimeout(createChar, Math.random() * 1000);
        }

        function startAnimation() {
            const circle = document.querySelector('.circle');
            const introContainer = document.querySelector('.intro-container');
            const mainPage = document.querySelector('.main-page');

            circle.classList.add('spin');
            setTimeout(() => {
                introContainer.style.display = 'none';
                mainPage.classList.add('visible');
                showSlide(0);
                startSlideTimer();
                startBlogUpdate();
                changeLanguage('fa');
            }, 500);
        }

        'use strict';
        const sections = document.querySelectorAll('section');
        const navLinks = document.querySelectorAll('.header-nav a');
        const timerElement = document.getElementById('timer');
        let currentSlide = 0;
        let slideInterval, timerInterval;
        let timeLeft = 30;
        let currentPosts = [];

        const translations = {

            home: { fa: "خانه", en: "Home", ar: "الصفحة الرئيسية", zh: "主页", ru: "Главная" },
            telegram: { fa: "تلگرام", en: "Telegram", ar: "تليجرام", zh: "Telegram", ru: "Telegram" },
            github: { fa: "گیت‌هاب", en: "GitHub", ar: "جيت هاب", zh: "GitHub", ru: "GitHub" },
            email: { fa: "ایمیل", en: "Email", ar: "البريد الإلكتروني", zh: "电子邮件", ru: "Электронная почта" },
            blog: { fa: "وبلاگ", en: "Blog", ar: "مدونة", zh: "博客", ru: "Блог" },
            slides: [
                { fa: "ما جمعی هستیم که تحت نام \"آزادنت\" گرد هم آمده‌ایم، با هدف ارائه خدمات رایگان و بدون محدودیت برای دسترسی به اطلاعات آزاد. ما خود را تابع قوانین ستمگرانه نمی‌دانیم و در راستای آزادی و سربلندی گام برمی‌داریم.",

                  en: "We introduce you to a collection of useful and efficient websites that assist you in daily tasks.",

                  zh: "我们向您介绍一系列实用且高效的网站，帮助您完成日常任务。",

            ]
        };

        // محتوای استاتیک پیش‌فرض برای اسلاید وبلاگ (۱۰ پست آخر از hpip.blogspot.com تا مارس ۲۰۲۵)
        const defaultBlogPosts = [
            { title: "پست تستی ۱", content: "این یک پست تستی است برای بررسی عملکرد سیستم...", link: "https://hpip.blogspot.com/2025/03/test-post-1.html", date: new Date("2025-03-01"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۲", content: "محتوای تستی برای نمایش در اسلاید وبلاگ...", link: "https://hpip.blogspot.com/2025-02-25", date: new Date("2025-02-25"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۳", content: "یک نمونه دیگر از محتوای تستی...", link: "https://hpip.blogspot.com/2025-02-20", date: new Date("2025-02-20"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۴", content: "این پست برای تست فیلترها و مرتب‌سازی است...", link: "https://hpip.blogspot.com/2025-02-15", date: new Date("2025-02-15"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۵", content: "محتوای تستی با هدف آزمایش نمایش...", link: "https://hpip.blogspot.com/2025-02-10", date: new Date("2025-02-10"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۶", content: "این یک پست تستی دیگر است...", link: "https://hpip.blogspot.com/2025-02-05", date: new Date("2025-02-05"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۷", content: "محتوای تستی برای بررسی قابلیت‌ها...", link: "https://hpip.blogspot.com/2025-01-30", date: new Date("2025-01-30"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۸", content: "پست تستی با تاریخ قدیمی‌تر...", link: "https://hpip.blogspot.com/2025-01-25", date: new Date("2025-01-25"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۹", content: "یک نمونه تستی دیگر...", link: "https://hpip.blogspot.com/2025-01-20", date: new Date("2025-01-20"), categories: ["تست"], hashtags: ["#تست"] },
            { title: "پست تستی ۱۰", content: "آخرین پست تستی برای تکمیل لیست...", link: "https://hpip.blogspot.com/2025-01-15", date: new Date("2025-01-15"), categories: ["تست"], hashtags: ["#تست"] }
        ];

        async function fetchBlogPosts() {
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const blogFeedUrl = 'https://hpip.blogspot.com/feeds/posts/default?max-results=10';
                const response = await fetch(`${proxyUrl}${encodeURIComponent(blogFeedUrl)}`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/xml' }
                });
                if (!response.ok) throw new Error('پاسخ شبکه ناموفق بود');
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, 'text/xml');

                if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
                    throw new Error('خطا در تجزیه XML');
                }

                const items = Array.from(xmlDoc.getElementsByTagName('entry'));
                const newPosts = items.map(item => {
                    const title = item.getElementsByTagName('title')[0]?.textContent || 'بدون عنوان';
                    const content = item.getElementsByTagName('content')[0]?.textContent || 'بدون محتوا';
                    const link = Array.from(item.getElementsByTagName('link')).find(l => l.getAttribute('rel') === 'alternate')?.getAttribute('href') || '#';
                    const date = new Date(item.getElementsByTagName('published')[0]?.textContent || Date.now());
                    const categories = Array.from(item.getElementsByTagName('category')).map(cat => cat.getAttribute('term') || 'بدون دسته‌بندی');
                    const hashtags = content.match(/#\w+/g) || [];
                    return { title, content: content.substring(0, 200) + '...', link, date, categories, hashtags };
                });

                if (newPosts.length > 0) {
                    currentPosts = newPosts.slice(0, 10); // فقط ۱۰ پست آخر
                } else {
                    currentPosts = defaultBlogPosts; // در صورت خالی بودن، از پیش‌فرض استفاده کن
                }

                displayBlogPosts(currentPosts);
                populateFilters(currentPosts);
            } catch (error) {
                console.error('خطا در دریافت پست‌های وبلاگ:', error);
                currentPosts = defaultBlogPosts; // در صورت خطا، از محتوای پیش‌فرض استفاده کن
                displayBlogPosts(currentPosts);
                populateFilters(currentPosts);
            }
        }

        function displayBlogPosts(posts) {
            const blogSlide = document.querySelectorAll('section')[4];
            const contentBox = blogSlide.querySelector('.content-box');
            contentBox.innerHTML = `
                <div class="blog-filter">
                    <select id="sort-time" onchange="sortPostsByTime(this.value)">
                        <option value="desc">جدید به قدیم</option>
                        <option value="asc">قدیم به جدید</option>
                    </select>
                    <select id="filter-hashtag" onchange="filterPostsByHashtag(this.value)">
                        <option value="">همه هشتگ‌ها</option>
                    </select>
                    <select id="filter-category" onchange="filterPostsByCategory(this.value)">
                        <option value="">همه دسته‌بندی‌ها</option>
                    </select>
                </div>
            `;

            const postsContainer = document.createElement('div');
            posts.forEach(post => {
                const postElement = document.createElement('div');
                postElement.classList.add('blog-post');
                postElement.innerHTML = `
                    <h3 style="color: gold;">${post.title}</h3>
                    <p>${post.content}</p>
                    <p style="font-size: 12px; color: #ccc;">تاریخ: ${post.date.toLocaleDateString('fa-IR')}</p>
                    <p style="font-size: 12px; color: #ccc;">هشتگ‌ها: ${post.hashtags.join(', ') || 'بدون هشتگ'}</p>
                    <p style="font-size: 12px; color: #ccc;">دسته‌بندی: ${post.categories.join(', ') || 'بدون دسته‌بندی'}</p>
                    <a href="${post.link}" target="_blank" class="glass-button">ادامه مطلب</a>
                `;
                postsContainer.appendChild(postElement);
            });
            contentBox.appendChild(postsContainer);
        }

        function populateFilters(posts) {
            const hashtagSelect = document.getElementById('filter-hashtag');
            const categorySelect = document.getElementById('filter-category');

            const allHashtags = [...new Set(posts.flatMap(post => post.hashtags))];
            const allCategories = [...new Set(posts.flatMap(post => post.categories))];

            allHashtags.forEach(hashtag => {
                const option = document.createElement('option');
                option.value = hashtag;
                option.textContent = hashtag;
                hashtagSelect.appendChild(option);
            });

            allCategories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelect.appendChild(option);
            });
        }

        function sortPostsByTime(order) {
            const sortedPosts = [...currentPosts];
            sortedPosts.sort((a, b) => order === 'desc' ? b.date - a.date : a.date - b.date);
            displayBlogPosts(sortedPosts);
        }

        function filterPostsByHashtag(hashtag) {
            if (!hashtag) {
                displayBlogPosts(currentPosts);
            } else {
                const filteredPosts = currentPosts.filter(post => post.hashtags.includes(hashtag));
                displayBlogPosts(filteredPosts);
            }
        }

        function filterPostsByCategory(category) {
            if (!category) {
                displayBlogPosts(currentPosts);
            } else {
                const filteredPosts = currentPosts.filter(post => post.categories.includes(category));
                displayBlogPosts(filteredPosts);
            }
        }

        function showSlide(slideIndex) {
            sections[currentSlide].classList.remove('active');
            if (navLinks[currentSlide]) {
                navLinks[currentSlide].classList.remove('active');
            }
            currentSlide = slideIndex;
            sections[currentSlide].classList.add('active');
            if (navLinks[currentSlide]) {
                navLinks[currentSlide].classList.add('active');
            }
            resetTimer();

            if (slideIndex === 4) {
                fetchBlogPosts();
            }
        }

        function startSlideTimer() {
            clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                let nextSlide = (currentSlide + 1) % sections.length;
                showSlide(nextSlide);
            }, 30000);
        }

        function startCountdown() {
            clearInterval(timerInterval);
            timeLeft = 30;
            timerElement.textContent = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function resetTimer() {
            startCountdown();
        }

        function startBlogUpdate() {
            fetchBlogPosts(); // بارگذاری اولیه
            setInterval(() => {
                if (currentSlide === 4) {
                    fetchBlogPosts(); // به‌روزرسانی وقتی اسلاید وبلاگ فعاله
                }
            }, 300000); // هر ۵ دقیقه
        }

        function changeLanguage(lang) {
            document.documentElement.lang = lang;
            document.getElementById('header-text').textContent = translations.header[lang];
            document.querySelector('.lang-btn').textContent = translations.langBtn[lang];
            document.querySelector('.theme-btn').textContent = translations.themeBtn[lang];
            document.querySelectorAll('.header-nav a').forEach((a, index) => {
                a.textContent = translations[['home', 'telegram', 'github', 'email', 'blog'][index]][lang];
            });
            document.querySelectorAll('.content-box').forEach((box, index) => {
                const slideText = box.querySelector('.slide-text');
                if (slideText && index < translations.slides.length) {
                    slideText.textContent = translations.slides[index][lang];
                } else if (index < translations.slides.length) {
                    box.textContent = translations.slides[index][lang];
                }
                box.setAttribute('data-lang', lang);
            });
            document.body.style.direction = (lang === 'ar' || lang === 'fa') ? 'rtl' : 'ltr';
            document.getElementById('header-text').style.direction = (lang === 'ar' || lang === 'fa') ? 'rtl' : 'ltr';

            document.querySelectorAll('.language-selector .dropdown span').forEach(span => {
                span.classList.remove('selected');
            });
            const selectedLangSpan = Array.from(document.querySelectorAll('.language-selector .dropdown span'))
                .find(span => span.onclick.toString().includes(`'${lang}'`));
            if (selectedLangSpan) {
                selectedLangSpan.classList.add('selected');
            }
        }

        const colorPalettes = [
            { bg: '#2D1B3F', text: '#F4E7D3', accent: '#D9A7B0' },
            { bg: '#1A3C34', text: '#E8F1F2', accent: '#F4A261' },
            { bg: '#0A1828', text: '#BFAFA6', accent: '#178CA4' },
            { bg: '#3C2F2F', text: '#FFF4E6', accent: '#BE9B7B' },
            { bg: '#14213D', text: '#FCA311', accent: '#E5E5E5' }
        ];

        function getDailyPalettes() {
            const today = new Date().toISOString().slice(0, 10);
            const seed = today.split('-').reduce((acc, val) => acc + parseInt(val), 0);
            const shuffled = [...colorPalettes].sort(() => 0.5 - Math.random(seed));
            return shuffled.slice(0, 3);
        }

        const dailyPalettes = getDailyPalettes();

        function changeTheme(theme) {
            const body = document.body;
            const header = document.querySelector('.header');
            const contentBoxes = document.querySelectorAll('.content-box');
            const glassButtons = document.querySelectorAll('.glass-button');
            const dnaStrands = document.querySelectorAll('.dna-strand');
            const footer = document.querySelector('footer');
            const patternSlides = document.querySelectorAll('.pattern-slide');

            if (theme === 'default') {
                body.style.background = '';
                body.style.color = '';
                header.style.background = '';
                header.style.borderBottom = '1px solid rgba(255, 255, 255, 0.2)';
                contentBoxes.forEach(box => {
                    box.style.background = 'rgba(0, 0, 0, 0.5)';
                    box.style.color = 'white';
                });
                glassButtons.forEach(btn => {
                    btn.style.background = 'rgba(255, 255, 255, 0.1)';
                    btn.style.border = '1px solid rgba(255, 255, 255, 0.2)';
                    btn.style.color = 'gold';
                });
                dnaStrands.forEach(strand => strand.style.background = 'rgba(255, 215, 0, 0.7)');
                footer.style.background = 'rgba(0, 0, 0, 0.5)';
                footer.style.color = 'white';
                patternSlides.forEach(slide => {
                    slide.style.setProperty('--slide-bg-color', 'transparent');
                });
            } else {
                const palette = dailyPalettes[parseInt(theme.replace('palette', '')) - 1];
                body.style.background = palette.bg;
                body.style.color = palette.text;
                header.style.background = `rgba(${hexToRgb(palette.bg)}, 0.1)`;
                header.style.borderBottom = `1px solid ${palette.accent}`;
                contentBoxes.forEach(box => {
                    box.style.background = `rgba(${hexToRgb(palette.bg)}, 0.5)`;
                    box.style.color = palette.text;
                });
                glassButtons.forEach(btn => {
                    btn.style.background = `rgba(${hexToRgb(palette.text)}, 0.1)`;
                    btn.style.border = `1px solid ${palette.accent}`;
                    btn.style.color = palette.accent;
                });
                dnaStrands.forEach(strand => strand.style.background = palette.accent);
                footer.style.background = `rgba(${hexToRgb(palette.bg)}, 0.5)`;
                footer.style.color = palette.text;
                patternSlides.forEach(slide => {
                    slide.style.setProperty('--slide-bg-color', palette.bg);
                });
            }

            document.querySelectorAll('.theme-selector .dropdown span').forEach(span => {
                span.classList.remove('selected');
            });
            const selectedThemeSpan = Array.from(document.querySelectorAll('.theme-selector .dropdown span'))
                .find(span => span.onclick.toString().includes(`'${theme}'`));
            if (selectedThemeSpan) {
                selectedThemeSpan.classList.add('selected');
            }
        }

        function hexToRgb(hex) {
            const bigint = parseInt(hex.slice(1), 16);
            const r = (bigint >> 16) & 255;
            const g = (bigint >> 8) & 255;
            const b = bigint & 255;
            return `${r}, ${g}, ${b}`;
        }

        const header = document.querySelector('.header');
        const dnaStrands = document.querySelectorAll('.dna-strand');

        header.addEventListener('mousemove', (e) => {
            const rect = header.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            dnaStrands.forEach((strand, index) => {
                const baseX = rect.width * [0.1, 0.3, 0.5, 0.7, 0.1, 0.3, 0.5, 0.7, 0.1, 0.3, 0.5, 0.7][index];
                const baseY = rect.height * [0.1, 0.1, 0.1, 0.1, 0.3, 0.3, 0.3, 0.3, 0.5, 0.5, 0.5, 0.5][index];
                const moveX = (mouseX - baseX) / 20;
                const moveY = (mouseY - baseY) / 20;
                strand.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${moveX * 2}deg)`;
            });
        });

        header.addEventListener('mouseleave', () => {
            dnaStrands.forEach((strand) => {
                strand.style.transform = '';
            });
        });

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                const slideIndex = parseInt(link.getAttribute('data-slide'));
                if (slideIndex !== currentSlide) {
                    showSlide(slideIndex);
                    startSlideTimer();
                }
            });
        });
    </script>
