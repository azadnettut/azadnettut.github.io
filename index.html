    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden; /* جلوگیری از اسکرول افقی */
            background-color: #000;
            font-family: 'Vazir', sans-serif;
            direction: rtl;
        }

        .slides-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 100px); /* تنظیم ارتفاع با توجه به هدر */
            margin-top: 100px;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.25s ease;
            background-repeat: no-repeat;
        }

        section.active { opacity: 1; }

        section:nth-child(1) { background: none; }
        section:nth-child(1) video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        section:nth-child(2) { background-image: url('11.jpg'); }
        section:nth-child(3) { background-image: url('12.jpg'); }
        section:nth-child(4) { background-image: url('13.jpg'); }
        section:nth-child(5) { background-image: url('14.jpg'); }
        section:nth-child(6) { background-image: url('15.jpg'); }
        section:nth-child(7) { background-image: url('16.jpg'); }
        section:nth-child(8) { background-image: url('17.jpg'); }

        .nav-dots {
            position: fixed;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            background-color: gold;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .nav-dot.active { background-color: #fff; }
        .nav-dot:hover { background-color: #ccc; }

        .timer-circle {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            background-color: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
        }

        .content-box {
            position: absolute;
            z-index: 500;
            color: white;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            max-width: 90%;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
            font-size: 18px;
            text-align: center;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            margin: 5px 0;
            font-size: 32px;
            color: gold;
            font-family: 'Aparat', 'Vazir', sans-serif; /* فونت جایگزین */
            text-align: center;
        }

        .header-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 5px;
            justify-content: center;
        }

        .header-nav a {
            color: gold;
            font-family: 'Vazir', sans-serif;
            font-size: 16px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .header-nav a:hover { color: #fff; }

        .dna-structure {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .dna-strand {
            position: absolute;
            width: 4px;
            height: 20px;
            background: rgba(255, 215, 0, 0.7);
            border-radius: 2px;
            transition: transform 0.2s ease-out;
        }

        .dna-strand:nth-child(1) { top: 10%; left: 20%; }
        .dna-strand:nth-child(2) { top: 30%; left: 40%; }
        .dna-strand:nth-child(3) { top: 50%; left: 60%; }
        .dna-strand:nth-child(4) { top: 70%; left: 80%; }

        .language-selector {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 3000;
        }

        .language-selector .lang-btn {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Vazir', sans-serif;
            font-size: 14px;
        }

        .language-selector .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 5px;
            padding: 5px;
            flex-direction: column;
        }

        .language-selector:hover .dropdown { display: flex; }

        .language-selector .dropdown span {
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .language-selector .dropdown span:hover { background: rgba(0, 0, 0, 0.1); }

        .language-option img { width: 16px; height: 16px; }

        .glass-button {
            display: block;
            margin: 15px auto 0;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: gold;
            font-family: 'Vazir', sans-serif;
            font-size: 16px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .glass-button:hover { background: rgba(255, 255, 255, 0.2); }

        /* مدیا کوئری برای تبلت */
        @media (max-width: 768px) {
            .header { height: 80px; }
            .header h1 { font-size: 24px; }
            .header-nav { gap: 10px; }
            .header-nav a { font-size: 14px; }
            .slides-container { margin-top: 80px; height: calc(100vh - 80px); }
            .content-box { max-width: 85%; font-size: 16px; top: 10%; }
            .timer-circle { width: 35px; height: 35px; font-size: 14px; }
            .nav-dots { left: 5px; }
        }

        /* مدیا کوئری برای موبایل */
        @media (max-width: 480px) {
            .header { height: 60px; padding: 5px; }
            .header h1 { font-size: 20px; }
            .header-nav { 
                flex-direction: column; 
                gap: 5px; 
                margin-top: 2px; 
            }
            .header-nav a { font-size: 12px; }
            .slides-container { margin-top: 60px; height: calc(100vh - 60px); }
            .content-box { 
                max-width: 90%; 
                font-size: 14px; 
                top: 5%; 
                padding: 10px; 
            }
            .nav-dots { left: 5px; gap: 6px; }
            .nav-dot { width: 5px; height: 5px; }
            .timer-circle { 
                width: 30px; 
                height: 30px; 
                font-size: 12px; 
                bottom: 5px; 
                left: 5px; 
            }
            .language-selector .lang-btn { font-size: 12px; padding: 4px 8px; }
            .language-selector .dropdown span { font-size: 10px; }
            .glass-button { font-size: 14px; padding: 6px 12px; }
        }

        function showSlide(slideIndex) {
            sections[currentSlide].classList.remove('active');
            navDots[currentSlide].classList.remove('active');
            currentSlide = slideIndex;
            sections[currentSlide].classList.add('active');
            navDots[currentSlide].classList.add('active');
            resetTimer();
        }

        function startSlideTimer() {
            clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                showSlide((currentSlide + 1) % sections.length);
            }, 15000);
        }

        function startCountdown() {
            clearInterval(timerInterval);
            timeLeft = 15;
            timerElement.textContent = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                if (timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
        }

        function resetTimer() {
            startCountdown();
        }

        function changeLanguage(lang) {
            document.documentElement.lang = lang;
            document.getElementById('header-text').textContent = translations.header[lang];
            document.getElementById('blog-button').textContent = translations.blogButton[lang];
            document.getElementById('bots-button').textContent = translations.botsButton[lang];
            document.querySelector('.lang-btn').textContent = translations.langBtn[lang];
            document.querySelectorAll('.header-nav a').forEach((a, index) => {
                a.textContent = translations[['home', 'telegram', 'github', 'email', 'blog'][index]][lang];
            });
            document.querySelectorAll('.content-box').forEach((box, index) => {
                const slideText = box.querySelector('.slide-text');
                if (slideText) {
                    slideText.textContent = translations.slides[index][lang];
                } else {
                    box.textContent = translations.slides[index][lang];
                }
                box.setAttribute('data-lang', lang);
            });
            document.body.style.direction = (lang === 'ar' || lang === 'fa') ? 'rtl' : 'ltr';
            document.getElementById('header-text').style.direction = (lang === 'ar' || lang === 'fa') ? 'rtl' : 'ltr';
        }

        const header = document.querySelector('.header');
        const dnaStrands = document.querySelectorAll('.dna-strand');

        header.addEventListener('mousemove', (e) => {
            const rect = header.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            dnaStrands.forEach((strand, index) => {
                const baseX = rect.width * [0.2, 0.4, 0.6, 0.8][index];
                const baseY = rect.height * [0.1, 0.3, 0.5, 0.7][index];
                const moveX = (mouseX - baseX) / 20;
                const moveY = (mouseY - baseY) / 20;
                strand.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${moveX * 2}deg)`;
            });
        });

        header.addEventListener('mouseleave', () => {
            dnaStrands.forEach((strand) => {
                strand.style.transform = '';
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            showSlide(currentSlide);
            startSlideTimer();
            startCountdown();
            changeLanguage('fa');

            navDots.forEach(dot => {
                dot.addEventListener('click', () => {
                    const slideIndex = parseInt(dot.getAttribute('data-slide'));
                    if (slideIndex !== currentSlide) {
                        showSlide(slideIndex);
                        startSlideTimer();
                    }
                });
            });
        });
    </script>
